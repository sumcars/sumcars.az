<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SumCars - Premium Admin Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        /* --- PREMIUM DİZAYN PARAMETRLƏRİ --- */
        :root {
            --bg-color: #0d0d0d;
            --primary-gold: #D4AF37;
            --text-white: #ffffff;
            --dark-gray: #1a1a1a;
            --card-bg: rgba(26, 26, 26, 0.9);
            --danger-red: #de3333;
            --success-green: #2ecc71;
            --warning-orange: #f39c12;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-white); padding: 30px 20px; }

        .container { max-width: 1000px; margin: 0 auto; }
        
        /* --- ÜST KONTROL ÇUBUĞU --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .back-home { color: var(--text-white); text-decoration: none; border: 1px solid var(--primary-gold); padding: 8px 20px; border-radius: 20px; transition: 0.3s; font-size: 14px; }
        .back-home:hover { background: var(--primary-gold); color: var(--bg-color); }

        /* --- GİRİŞ EKRANI (LOGIN) --- */
        .login-wrapper { height: 80vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card-bg); border: 2px solid var(--primary-gold); padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); text-align: center; }
        .login-card h2 { color: var(--primary-gold); margin-bottom: 25px; letter-spacing: 2px; }

        /* --- NAVİQASİYA (TABS) --- */
        .admin-nav { display: flex; gap: 15px; margin-bottom: 30px; border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 15px; flex-wrap: wrap; }
        .nav-tab { background: transparent; border: 1px solid #444; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold; flex: 1; text-align: center; min-width: 150px; }
        .nav-tab.active, .nav-tab:hover { background: var(--primary-gold); color: var(--bg-color); border-color: var(--primary-gold); }

        /* --- FORMALAR VƏ INPUTLAR --- */
        .panel-section { background: var(--dark-gray); border: 1px solid #333; padding: 30px; border-radius: 12px; margin-bottom: 30px; display: none; }
        .panel-section.active { display: block; }
        h3 { color: var(--primary-gold); margin-bottom: 20px; font-size: 22px; }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, textarea, select { width: 100%; padding: 12px; background: #050505; border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary-gold); }

        /* --- DÜYMƏLƏR --- */
        .btn { padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-gold { background: var(--primary-gold); color: black; }
        .btn-gold:hover { background: white; box-shadow: 0 0 15px rgba(255,255,255,0.4); }
        .btn-danger { background: var(--danger-red); color: white; }
        .btn-warning { background: var(--warning-orange); color: white; }
        .btn-success { background: var(--success-green); color: white; }

        /* --- SİYAHI (MAŞINLARI SİLMƏK ÜÇÜN) --- */
        .car-list-item { display: flex; justify-content: space-between; align-items: center; background: #0d0d0d; padding: 15px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--primary-gold); flex-wrap: wrap; gap: 10px; }

        /* --- TƏMİR REJİMİ BLOKU (3 DÜYMƏLİ) --- */
        .maintenance-box { display: flex; flex-direction: column; background: #111; border: 1px solid #444; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .maintenance-header { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .maint-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .maint-buttons .btn { flex: 1; min-width: 150px; }
        
        .active-status { font-weight: bold; color: var(--primary-gold); margin-top: 10px; }

        /* --- ONAY (CONFIRM) POPUP --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .modal-box { background: var(--dark-gray); border: 2px solid var(--primary-gold); padding: 30px; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; }
        .modal-box p { font-size: 18px; margin-bottom: 20px; }
        .modal-box .btn-group { display: flex; gap: 10px; justify-content: center; }

        /* MOBİL UYĞUNLUQ */
        @media (max-width: 768px) {
            .input-grid { grid-template-columns: 1fr; }
            .car-list-item { flex-direction: column; align-items: flex-start; }
            .car-list-item button { width: 100%; }
        }
    </style>
</head>
<body>

<div id="confirmModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <p id="confirmText">Əminsiniz?</p>
        <div class="btn-group">
            <button id="btnConfirm" class="btn btn-gold">Bəli, Təsdiqlə</button>
            <button onclick="closeModal()" class="btn btn-danger">Ləğv Et</button>
        </div>
    </div>
</div>

<div class="container">

    <div class="login-wrapper" id="loginPage">
        <div class="login-card">
            <h2>SUMCARS ADMIN</h2>
            <input type="password" id="adminPassword" placeholder="Admin Şifrəsi" style="text-align: center; margin-bottom: 20px;">
            <button class="btn btn-gold" style="width: 100%;" onclick="loginSystem()">Sistemə Giriş</button>
        </div>
    </div>

    <div id="mainPanel" style="display: none;">
        
        <div class="top-bar">
            <h2>Admin İdarəetmə Paneli</h2>
            <a href="index.html" class="back-home">⬅ Ana Səhifəyə Qayıt</a>
        </div>
        
        <div class="maintenance-box">
            <div class="maintenance-header">
                <h4 style="font-size: 18px;">Saytın Vəziyyəti</h4>
                <p style="font-size: 14px; color: #aaa; margin-top: 5px;">Aşağıdakı düymələrdən birini seçərək saytın görünüşünü dəyişə bilərsiniz.</p>
                <p class="active-status" id="currentStatusText">Cari vəziyyət: Normal (Açıq)</p>
            </div>
            <div class="maint-buttons">
                <button class="btn btn-warning" onclick="requestStatusChange('soon', 'Ana ekranda \'Tezliklə Açılacaq\' yazılacaq. Təsdiqləyirsiniz?')">Tezliklə Açılacaq</button>
                <button class="btn btn-danger" onclick="requestStatusChange('closed', 'Ana ekranda \'Sayt Təmirdədir\' yazılacaq. Təsdiqləyirsiniz?')">Sayt Təmirdədir</button>
                <button class="btn btn-success" onclick="requestStatusChange('open', 'Sayt normal fəaliyyətinə dönəcək. Təsdiqləyirsiniz?')">Normal Rejim (Aç)</button>
            </div>
        </div>

        <div class="admin-nav">
            <button class="nav-tab active" onclick="switchTab('salesSection', this)">Avtomobil Satışı</button>
            <button class="nav-tab" onclick="switchTab('rentSection', this)">Rent a Car (İcarə)</button>
        </div>

        <div id="salesSection" class="panel-section active">
            <h3>Yeni Satılıq Avtomobil</h3>
            <form id="salesForm" onsubmit="handleFormSubmit(event, 'sales')">
                <div class="input-grid">
                    <input type="text" placeholder="Marka və Model (Məs: BMW F30)" required>
                    <input type="text" placeholder="Qiymət ($ və ya AZN)" required>
                </div>
                <div class="input-grid">
                    <input type="number" placeholder="İl" required>
                    <input type="text" placeholder="Yürüş (km)" required>
                </div>
                <div class="input-grid">
                    <input type="text" placeholder="Mühərrik Həcmi" required>
                    <input type="text" placeholder="Rəng" required>
                </div>
                <input type="file" id="salesImage" accept="image/*" style="margin-bottom: 15px;" required>
                <button type="submit" class="btn btn-gold">Sayta Yerləşdir</button>
            </form>

            <h3 style="margin-top: 40px;">Mövcud Satış Elanları</h3>
            <div id="salesList">
                </div>
        </div>

        <div id="rentSection" class="panel-section">
            <h3>Yeni İcarəlik Avtomobil (Rent)</h3>
            <form id="rentForm" onsubmit="handleFormSubmit(event, 'rent')">
                <div class="input-grid">
                    <input type="text" placeholder="Marka və Model (Məs: Mercedes E-Class)" required>
                    <input type="text" placeholder="Günlük Qiymət (AZN)" required>
                </div>
                <div class="input-grid">
                    <input type="number" placeholder="İl" required>
                    <select required>
                        <option value="" disabled selected>Sürətlər Qutusu</option>
                        <option value="Avtomat">Avtomat</option>
                        <option value="Mexanika">Mexanika</option>
                    </select>
                </div>
                <input type="file" id="rentImage" accept="image/*" style="margin-bottom: 15px;" required>
                <button type="submit" class="btn btn-gold">Rent Siyahısına Əlavə Et</button>
            </form>

            <h3 style="margin-top: 40px;">Mövcud Rent Elanları</h3>
            <div id="rentList">
                 </div>
        </div>

    </div>
</div>

<script>
    // --- ONAY (POPUP) SİSTEMİ ---
    let pendingAction = null;
    
    function openModal(text, actionFunction) {
        document.getElementById('confirmText').innerText = text;
        pendingAction = actionFunction;
        document.getElementById('confirmModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('confirmModal').style.display = 'none';
        pendingAction = null;
    }

    document.getElementById('btnConfirm').addEventListener('click', function() {
        if(pendingAction) pendingAction();
        closeModal();
    });

    // --- GİRİŞ SİSTEMİ ---
    function loginSystem() {
        const pass = document.getElementById('adminPassword').value;
        if (pass === "sumcars2026") { 
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            updateStatusText();
        } else {
            alert("Daxil etdiyiniz şifrə yanlışdır!");
        }
    }

    // --- TAB KEÇİDLƏRİ ---
    function switchTab(sectionId, element) {
        document.querySelectorAll('.panel-section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        element.classList.add('active');
    }

    // --- 3 REJİMLİ SAYT VƏZİYYƏTİ ---
    function requestStatusChange(newStatus, message) {
        openModal(message, () => {
            localStorage.setItem('siteStatus', newStatus);
            updateStatusText();
            // Firebase'e de gələcəkdə statusu yazacağıq ki, bütün istifadəçilər anında görsün.
        });
    }

    function updateStatusText() {
        const status = localStorage.getItem('siteStatus') || 'open';
        const statusEl = document.getElementById('currentStatusText');
        
        if(status === 'soon') {
            statusEl.innerText = "Cari vəziyyət: Tezliklə Açılacaq";
            statusEl.style.color = "var(--warning-orange)";
        } else if (status === 'closed') {
            statusEl.innerText = "Cari vəziyyət: Sayt Təmirdədir";
            statusEl.style.color = "var(--danger-red)";
        } else {
            statusEl.innerText = "Cari vəziyyət: Normal (Açıq)";
            statusEl.style.color = "var(--success-green)";
        }
    }

    // --- FORM GÖNDƏRMƏ VƏ SİLMƏ ---
    function handleFormSubmit(e, type) {
        e.preventDefault();
        console.log(type + " üçün məlumatlar bazaya göndərilməyə hazırdır.");
    }

    // Silmə funksiyası nümunəsi (Firebase gələndə bura ID ötürəcəyik)
    function confirmDelete(carId) {
        openModal("Bu elanı silmək istədiyinizə əminsiniz?", () => {
            // db.collection('cars').doc(carId).delete()
            console.log("Maşın silindi: " + carId);
        });
    }
</script>

</body>
</html>
