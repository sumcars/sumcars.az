<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SumCars | Ana Səhifə</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37; 
            --bg-white: #ffffff; 
            --light-gray: #f8f9fa; 
            --border-color: #e0e0e0; 
            --text-dark: #1a1a1a; 
            --text-muted: #6c757d; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-white); color: var(--text-dark); padding-bottom: 80px; }
        a { text-decoration: none; }

        /* YUXARI REKLAM - TAM EKRANA YAYILMASI ÜÇÜN DÜZƏLİŞ EDİLDİ */
        .top-banner {
            width: 100%;
            height: 100px; 
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 3px solid var(--gold);
            margin-bottom: 5px; 
        }

        .top-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* BU HİSSƏ DƏYİŞDİRİLDİ: Şəkil artıq qıraqlarda boşluq qoymayacaq */
        }

        /* Üst Panel (Header) */
        header {
            background-color: var(--light-gray);
            padding: 15px; 
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
            min-height: 70px;
        }
        .header-logo { position: absolute; left: 15px; height: 50px; width: auto; }
        header h1 { color: var(--text-dark); font-weight: 800; letter-spacing: -1px; font-size: 24px; }

        /* Elanlar Siyahısı */
        .feed { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .car-card { background-color: var(--light-gray); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid var(--border-color); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .car-img { width: 100%; height: 140px; object-fit: cover; }
        .price-tag { background: var(--gold); color: #fff; position: absolute; top: 100px; left: 0; padding: 4px 10px; font-weight: 800; font-size: 14px; border-radius: 0 8px 8px 0; }
        .car-info { padding: 10px; }
        .car-model { font-weight: 600; font-size: 15px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-dark); }
        .car-meta { font-size: 12px; color: var(--text-muted); }

        /* SOLDAKI 5-Lİ REKLAM PƏNCƏRƏSİ (300x300) */
        .ad-box {
            position: fixed;
            left: 10px;
            bottom: 85px;
            width: 150px;  
            height: 150px; 
            background: var(--light-gray);
            border: 4px solid var(--gold);
            border-radius: 20px;
            padding: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-close {
            position: absolute;
            top: -12px;
            right: -12px;
            background: #ff4d4d;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid white;
            z-index: 3100;
        }

        .ad-content { 
            display: none; 
            width: 100%; 
            height: 100%; 
            animation: adFade 0.6s ease-in-out; 
        }
        
        .ad-content.active { 
            display: flex; 
        }

        @keyframes adFade {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .ad-content img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 15px; 
        }

        /* Alt Naviqasiya Paneli */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background-color: var(--light-gray); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border-color); z-index: 2000; }
        .nav-item { text-align: center; color: var(--text-muted); font-size: 10px; flex: 1; transition: 0.2s; }
        .nav-item.active { color: var(--gold); transform: scale(1.05); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="top-banner">
        <img src="mainreklam.jpg" alt="Main Reklam">
    </div>

    <header>
        <img src="LOGO.png" alt="Logo" class="header-logo">
        <h1>SUMCARS</h1>
    </header>

    <main class="feed">
        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=400" class="car-img">
            <div class="price-tag">45 500 AZN</div>
            <div class="car-info">
                <div class="car-model">BMW 5 Series</div>
                <div class="car-meta">2018 il • 2.0 L • 120 000 km</div>
            </div>
        </div>
        
        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1617814076367-b759c7d7e738?q=80&w=400" class="car-img">
            <div class="price-tag">82 000 AZN</div>
            <div class="car-info">
                <div class="car-model">Mercedes-Benz E-Class</div>
                <div class="car-meta">2020 il • 2.0 L • 45 000 km</div>
            </div>
        </div>
    </main>

    <div class="ad-box" id="mainAdBox">
        <div class="ad-close" onclick="document.getElementById('mainAdBox').style.display='none'">✖</div>
        
        <div class="ad-content active" id="ad1"><img src="reklam1.jpg"></div>
        <div class="ad-content" id="ad2"><img src="reklam2.jpg"></div>
        <div class="ad-content" id="ad3"><img src="reklam3.jpg"></div>
        <div class="ad-content" id="ad4"><img src="reklam4.jpg"></div>
        <div class="ad-content" id="ad5"><img src="reklam5.jpg"></div>
        <div class="ad-content" id="ad5"><img src="reklam6.jpg"></div
    </div>

    <nav class="bottom-nav">
        <a href="profil.html" class="nav-item">
            <span class="nav-icon">👤</span>Profil
        </a>
        <a href="mesajlar.html" class="nav-item">
            <span class="nav-icon">💬</span>Mesajlar
        </a>
        <a href="elan.html" class="nav-item">
            <span class="nav-icon">➕</span>Elan ver
        </a>
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🏠</span>Əsas
        </a>
    </nav>

    <script>
        let currentAd = 1;
        const totalAds = 5;

        setInterval(() => {
            const currentElem = document.getElementById(`ad${currentAd}`);
            if (currentElem) currentElem.classList.remove('active');
            
            currentAd = currentAd % totalAds + 1;
            
            const nextElem = document.getElementById(`ad${currentAd}`);
            if (nextElem) nextElem.classList.add('active');
        }, 10000);
    </script>

</body>
</html>
