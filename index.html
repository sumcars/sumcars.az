<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SumCars | Premium Maşın Bazarı</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --premium-black: #000000;
            --dark-gray: #121212;
            --card-gray: #1c1c1e;
            --text-white: #ffffff;
            --text-muted: #8e8e93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--premium-black);
            color: var(--text-white);
            padding-bottom: 80px; /* Alt menyu üçün boşluq */
        }

        /* Üst Panel */
        header {
            background-color: var(--dark-gray);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-logo {
            position: absolute;
            left: 15px;
            height: 35px; /* Loqonun ölçüsü */
            width: auto;
        }

        header h1 {
            color: var(--gold);
            font-weight: 800;
            letter-spacing: -1px;
            font-size: 24px;
        }

        /* Elanlar Siyahısı */
        .feed {
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .car-card {
            background-color: var(--card-gray);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 0.5px solid #333;
        }

        .car-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        .price-tag {
            background: var(--gold);
            color: #000;
            position: absolute;
            top: 100px;
            left: 0;
            padding: 4px 10px;
            font-weight: 800;
            font-size: 14px;
            border-radius: 0 8px 8px 0;
        }

        .car-info {
            padding: 10px;
        }

        .car-model {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .car-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Alt Naviqasiya Paneli (Turbo.az stili) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--dark-gray);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #333;
            z-index: 2000;
        }

        .nav-item {
            text-align: center;
            color: var(--text-muted);
            font-size: 10px;
            text-decoration: none;
            flex: 1;
        }

        .nav-item.active { color: var(--gold); }

        .nav-icon {
            font-size: 20px;
            display: block;
            margin-bottom: 4px;
        }

        /* Elan Ver Modal (Gizli Panel) */
        #add-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 3000;
            padding: 20px;
            overflow-y: auto;
        }

        .close-btn { color: var(--gold); float: right; font-size: 20px; }

        input, select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
        }

        .submit-btn {
            background: var(--gold);
            color: #000;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <img src="LOGO.png" alt="Logo" class="header-logo">
        <h1>SUMCARS</h1>
    </header>

    <main class="feed" id="carFeed">
        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=400" class="car-img">
            <div class="price-tag">45 500 AZN</div>
            <div class="car-info">
                <div class="car-model">BMW 5 Series</div>
                <div class="car-meta">2018 il • 2.0 L • 120 000 km</div>
            </div>
        </div>
        
        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1617814076367-b759c7d7e738?q=80&w=400" class="car-img">
            <div class="price-tag">82 000 AZN</div>
            <div class="car-info">
                <div class="car-model">Mercedes-Benz E-Class</div>
                <div class="car-meta">2020 il • 2.0 L • 45 000 km</div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="showPage('home')">
            <span class="nav-icon">🏠</span>Əsas
        </a>
        <a href="#" class="nav-item" onclick="showPage('messages')">
            <span class="nav-icon">💬</span>Mesajlar
        </a>
        <a href="#" class="nav-item" onclick="openAddPanel()">
            <span class="nav-icon">➕</span>Elan ver
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">👤</span>Profil
        </a>
    </nav>

    <div id="add-panel">
        <span class="close-btn" onclick="closeAddPanel()">Bağla ✖</span>
        <h2 style="margin-bottom: 20px; color: var(--gold);">Yeni Elan</h2>
        
        <input type="text" id="m_brand" placeholder="Marka və Model (məs: Mercedes C200)">
        <input type="number" id="m_year" placeholder="Buraxılış ili">
        <input type="text" id="m_engine" placeholder="Mühərrik (məs: 2.2 L)">
        <input type="number" id="m_price" placeholder="Qiymət (AZN)">
        <input type="text" id="m_wp" placeholder="WhatsApp nömrəsi (məs: 050XXXXXXX)">
        <input type="url" id="m_img" placeholder="Şəkil linki (URL)">
        
        <button class="submit-btn" onclick="postCar()">Elanı Yerləşdir</button>
    </div>

    <script>
        function openAddPanel() {
            document.getElementById('add-panel').style.display = 'block';
        }

        function closeAddPanel() {
            document.getElementById('add-panel').style.display = 'none';
        }

        function postCar() {
            const brand = document.getElementById('m_brand').value;
            const price = document.getElementById('m_price').value;
            const year = document.getElementById('m_year').value;
            const engine = document.getElementById('m_engine').value;
            const img = document.getElementById('m_img').value;
            const wp = document.getElementById('m_wp').value;

            if(!brand || !price || !img) {
                alert("Məlumatları tam doldurun!");
                return;
            }

            const newCar = `
                <div class="car-card" onclick="window.open('https://wa.me/${wp}')">
                    <img src="${img}" class="car-img">
                    <div class="price-tag">${price} AZN</div>
                    <div class="car-info">
                        <div class="car-model">${brand}</div>
                        <div class="car-meta">${year} il • ${engine} • WP: ${wp}</div>
                    </div>
                </div>
            `;

            document.getElementById('carFeed').innerHTML = newCar + document.getElementById('carFeed').innerHTML;
            closeAddPanel();
            alert("Elanınız yoxlanışa göndərildi (və ya sayta əlavə edildi)!");
        }

        function showPage(page) {
            if(page === 'messages') alert("Mesajlar bölməsi tezliklə aktiv olacaq!");
        }
    </script>
</body>
</html>
