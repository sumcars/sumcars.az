<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auto Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            padding-bottom: 50px;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }

        header h1 {
            color: var(--gold);
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Form Dizaynı */
        .add-car-section {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
        }

        .add-car-section h2 {
            color: var(--gold);
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        input {
            flex: 1 1 200px;
            padding: 12px;
            background-color: #000;
            border: 1px solid #444;
            color: var(--text-light);
            border-radius: 5px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--gold);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background-color: var(--gold);
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background-color: #b5952f;
        }

        /* Maşınlar Qalereyası */
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .car-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .car-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2);
        }

        .car-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #222;
        }

        .car-info {
            padding: 20px;
        }

        .car-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--gold);
        }

        .car-details {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .car-price {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
        }
    </style>
</head>
<body>

    <header>
        <h1>Premium Auto</h1>
    </header>

    <div class="container">
        
        <div class="add-car-section">
            <h2>Yeni Maşın Əlavə Et</h2>
            <div class="form-group">
                <input type="text" id="carMarka" placeholder="Marka və Model (məs. BMW M5)" required>
                <input type="number" id="carYear" placeholder="Buraxılış ili" required>
                <input type="text" id="carEngine" placeholder="Mühərrik (məs. 4.4 L)" required>
                <input type="number" id="carPrice" placeholder="Qiymət ($)" required>
                <input type="url" id="carImage" placeholder="Şəklin URL linki" required>
            </div>
            <button onclick="addCar()">Sayta Yerləşdir</button>
        </div>

        <div class="cars-grid" id="carsGrid">
            </div>

    </div>

    <script>
        // Bu hissə hələlik məlumatları ekranda göstərmək üçündür.
        // Hər kəsin görməsi üçün bu kodu Firebase ilə əvəz edəcəyik.
        
        function addCar() {
            const marka = document.getElementById('carMarka').value;
            const year = document.getElementById('carYear').value;
            const engine = document.getElementById('carEngine').value;
            const price = document.getElementById('carPrice').value;
            const image = document.getElementById('carImage').value;

            if(!marka || !year || !engine || !price || !image) {
                alert("Zəhmət olmasa bütün məlumatları doldurun!");
                return;
            }

            const carCard = `
                <div class="car-card">
                    <img src="${image}" alt="Car" class="car-image">
                    <div class="car-info">
                        <div class="car-title">${marka}</div>
                        <div class="car-details">
                            İl: ${year} <br>
                            Mühərrik: ${engine}
                        </div>
                        <div class="car-price">$${price}</div>
                    </div>
                </div>
            `;

            document.getElementById('carsGrid').innerHTML += carCard;

            // Formu təmizləmək
            document.getElementById('carMarka').value = '';
            document.getElementById('carYear').value = '';
            document.getElementById('carEngine').value = '';
            document.getElementById('carPrice').value = '';
            document.getElementById('carImage').value = '';
        }
    </script>
</body>
</html>
