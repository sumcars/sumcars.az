<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SumCars - Premium Avtomobil Satışı</title>
    
    <!-- Firebase üçün vacib linklər (Gələcəkdə admin panellə əlaqə üçün) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        /* --- ƏSAS RƏNGLƏR VƏ PARAMETRLƏR --- */
        :root {
            --bg-color: #0d0d0d;
            --primary-gold: #D4AF37;
            --text-white: #ffffff;
            --dark-gray: #1a1a1a;
            --card-bg: rgba(26, 26, 26, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-white); padding-bottom: 50px; }

        /* --- BAŞLIQ --- */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
            border-bottom: 2px solid var(--primary-gold);
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 42px;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .back-home {
            display: inline-block;
            margin-top: 15px;
            color: var(--text-white);
            text-decoration: none;
            border: 1px solid var(--primary-gold);
            padding: 8px 20px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .back-home:hover {
            background-color: var(--primary-gold);
            color: var(--bg-color);
        }

        /* --- MAŞIN KARTLARI (GRID SİSTEMİ) --- */
        .car-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .car-card {
            background: var(--card-bg);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        .car-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-gold);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2);
        }

        .car-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 2px solid var(--primary-gold);
        }

        .car-details {
            padding: 20px;
            flex-grow: 1;
        }

        .car-title {
            font-size: 24px;
            color: var(--primary-gold);
            margin-bottom: 15px;
            font-weight: bold;
        }

        .car-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #ccc;
        }

        .car-specs span {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 5px;
            border-left: 3px solid var(--primary-gold);
        }

        /* --- DÜYMƏLƏR --- */
        .btn-group {
            display: flex;
            gap: 10px;
            padding: 0 20px 20px 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            text-decoration: none;
        }

        .btn-buy {
            background-color: var(--primary-gold);
            color: var(--bg-color);
        }

        .btn-buy:hover {
            background-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        .btn-info {
            background-color: transparent;
            color: var(--primary-gold);
            border: 1px solid var(--primary-gold);
        }

        .btn-info:hover {
            background-color: var(--primary-gold);
            color: var(--bg-color);
        }

        /* Yüklənmə animasiyası */
        .loader { text-align: center; color: var(--primary-gold); font-size: 20px; width: 100%; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <header>
        <h1>Satışdakı Avtomobillər</h1>
        <a href="index.html" class="back-home">⬅ Ana Səhifəyə Qayıt</a>
    </header>

    <div class="car-container" id="car-list">
        <!-- Maşınlar Admin paneldən bura yüklənəcək. Hələlik sistemin necə görünəcəyini bilməyimiz üçün 1 dənə nümunə qoymuşam -->
        
        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="BMW" class="car-image">
            <div class="car-details">
                <div class="car-title">BMW F30 M-Sport</div>
                <div class="car-specs">
                    <span>📅 İl: 2016</span>
                    <span>🛣 Yürüş: 95,000 km</span>
                    <span>⚙️ Mühərrik: 2.0 L</span>
                    <span>🎨 Rəng: Qara</span>
                </div>
            </div>
            <div class="btn-group">
                <a href="https://wa.me/994500000000" class="btn btn-info">Haqqında məlumat al</a>
                <a href="tel:+994500000000" class="btn btn-buy">Maşını Al</a>
            </div>
        </div>
        
    </div>

    <script>
        // --- FİREBASE BAĞLANTISI (BUNU NÖVBƏTİ ADDIMDA AKTİVLƏŞDİRƏCƏYİK) ---
        // Admin paneli quranda sənə verəcəyim Firebase kodlarını bura yapışdıracağıq.
        // O zaman bu kod avtomatik olaraq bazaya (Database) girəcək və admin paneldən əlavə etdiyin maşınları canlı olaraq ekrana çəkəcək.
        
        /* 
        Məntiqi belə işləyəcək:
        1. db.collection('cars').get() -> Bazadakı bütün maşınları gətir.
        2. Hər bir maşın üçün HTML-də bir "car-card" yarat.
        3. Şəkilləri, ili, markanı kartın içinə yerləşdir.
        4. "Haqqında məlumat al" düyməsini canlı dəstəyə (WhatsApp) bağla.
        5. "Maşını al" düyməsini isə sənin yazdığın nömrəyə zəng etməyə yönləndir.
        */
    </script>

</body>
</html>
